# Deploy do Plante Gestão no Netlify (Next.js 15 + Prisma + Neon).
# O Netlify detecta o Next.js e instala o runtime oficial (@netlify/plugin-nextjs)
# automaticamente — não é preciso declarar o plugin aqui.

[build]
  # Aplica migrations pendentes (usa DIRECT_URL) e então gera o client + build do Next.
  command = "npx prisma migrate deploy && npm run build"

[build.environment]
  NODE_VERSION = "22"
  # Engines do Prisma vêm do schema (binaryTargets = ["native", "rhel-openssl-3.0.x"]):
  # "native" = engine de migração/build na máquina Debian do Netlify; "rhel-openssl-3.0.x"
  # = query engine do runtime serverless (AWS Lambda). NÃO definir PRISMA_CLI_BINARY_TARGETS
  # aqui, senão o Prisma deixa de baixar o engine "native" e o `migrate deploy` falha.
